<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Log Investigation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
    <form class="login-card" method="post" novalidate>
        <input name="csrf_token" type="hidden" value="{{ csrf_token }}">
        <div class="brand">
            <span class="brand-mark">AI</span>
            <div>
                <h1>Log Investigation</h1>
                <p>Investigator access</p>
            </div>
        </div>

        {% if error %}
        <p class="error-text">{{ error }}</p>
        {% endif %}

        <label>
            Username
            <input name="username" type="text" autocomplete="username" required autofocus value="{{ request.form.get('username', '') }}">
        </label>

        <label>
            Password
            <input name="password" type="password" autocomplete="current-password" required>
        </label>

        <button type="submit">Sign In</button>
    </form>
</body>
</html>
